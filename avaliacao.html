<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avaliação - Perfil Comportamental</title>
    <style>
        body { font-family: system-ui; padding: 20px; max-width: 700px; margin: auto; }
        .pergunta { margin-bottom: 24px; padding: 20px; background: #f8fafc; border-radius: 16px; }
        label { display: block; margin: 8px 0; cursor: pointer; }
        button { background: #0F172A; color: white; border: none; padding: 12px; border-radius: 40px; cursor: pointer; width: 100%; margin-top: 20px; }
        h1 { text-align: center; }
        .erro { color: red; background: #ffe0e0; padding: 12px; border-radius: 12px; margin: 20px 0; }
        .info { background: #e0f0ff; padding: 12px; border-radius: 12px; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>🎯 Avaliação de Perfil</h1>
    <div id="status">Carregando...</div>
    <div id="perguntas"></div>

    <script>
        (function() {
            const statusDiv = document.getElementById("status");
            const perguntasDiv = document.getElementById("perguntas");
            
            try {
                statusDiv.innerHTML = "✅ Script iniciado. Verificando token...";
                
                const urlParams = new URLSearchParams(window.location.search);
                const token = urlParams.get('token');
                
                statusDiv.innerHTML = `✅ Token encontrado: ${token ? token.substring(0,15)+'...' : 'nenhum'}`;
                
                if (!token) {
                    statusDiv.innerHTML = '<div class="erro">🔒 Link inválido. Solicite um novo convite.</div>';
                    return;
                }
                
                statusDiv.innerHTML = "✅ Token OK. Carregando perguntas...";
                
                fetch('https://viniciuseroseamerico.github.io/pesquisa-comportamental/dados/perguntas.json')
                    .then(res => {
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        return res.json();
                    })
                    .then(perguntas => {
                        statusDiv.innerHTML = `<div class="info">✅ ${perguntas.length} perguntas carregadas. Responda abaixo:</div>`;
                        
                        perguntas.forEach((p, i) => {
                            perguntasDiv.innerHTML += `
                                <div class="pergunta">
                                    <p><strong>${i+1}. ${p.pergunta}</strong></p>
                                    ${p.opcoes.map(op => `<label><input type="radio" name="q${i}" value="${op.tipo}"> ${op.texto}</label>`).join("")}
                                </div>
                            `;
                        });
                        
                        const btn = document.createElement("button");
                        btn.textContent = "Finalizar avaliação (teste)";
                        btn.onclick = () => alert("✅ Teste concluído! As perguntas apareceram.");
                        perguntasDiv.appendChild(btn);
                    })
                    .catch(err => {
                        statusDiv.innerHTML = `<div class="erro">❌ Erro ao carregar perguntas: ${err.message}<br><br>Verifique: https://viniciuseroseamerico.github.io/pesquisa-comportamental/dados/perguntas.json</div>`;
                    });
                    
            } catch(err) {
                statusDiv.innerHTML = `<div class="erro">❌ Erro no script: ${err.message}</div>`;
            }
        })();
    </script>
</body>
</html>
